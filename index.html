<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crave - Recipe Finder</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&family=Great+Vibes&family=Pinyon+Script&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="main">
        <div class="main-section">
            <div class="navbar">
                <div class="navbar-links" id="navbar-links">
                    <a href="" class="navbar-links-anchor">Home</a>
                    <a href="" class="navbar-links-anchor">Recipes</a>
                    <a href="" class="navbar-links-anchor">Contact</a>
                </div>
                <h2 class="navbar-heading">Crave</h2>
                <div class="navbar-search">
                    <div class="navbar-utility">
                        <input type="text" placeholder="Search...">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="navbar-user"></div>
                    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>

            <div class="hero">
                <div class="hero-images">
                    <img src="./images/hero_1.png" alt="">
                    <img src="./images/hero_2.png" alt="">
                    <img src="./images/hero_3.png" alt="">
                </div>
            </div>

            <div class="recipe">
                <div class="recipe-headings">
                    <h2 class="recipe-heading"><span>Too</span> much on your plate?</h2>
                    <h2 class="recipe-heading">Find the <span>perfect</span> recipe.</h2>
                </div>
                <div class="recipe-content">

                </div>
            </div>

            <div class="static">

            </div>

            <div class="footer">
                <div class="footer-top">
                    <div class="footer-top-left">
                        <h2 class="footer-top-heading">Crave</h2>
                        <p class="footer-top-para">Where every treat is a little slice of heaven.</p>
                    </div>
                    <div class="footer-top-right">
                        <div class="footer-top-right-links">
                        <a href="" class="footer-middle-anchor">Home</a>
                        <a href="" class="footer-middle-anchor">Recipe</a>
                        <a href="" class="footer-middle-anchor">Contact</a>
                        </div>
                        <div class="footer-top-right-links">
                        <a href="" class="footer-middle-anchor">Instagram</a>
                        <a href="" class="footer-middle-anchor">LinkedIn</a>
                        <a href="" class="footer-middle-anchor">Facebook</a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p class="footer-bottom-contact">Priyansh Tiwari</p>
                    <img src="https://upload.wikimedia.org/wikipedia/en/4/41/Flag_of_India.svg" alt="india flag">
                </div>
            </div>
        </div>
    </div>

    <script src="/JS/script.js"></script>
</body>

</html>
